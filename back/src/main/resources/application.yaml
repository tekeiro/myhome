spring:
  application:
    name: myhome
  datasource:
    url: jdbc:postgresql://localhost:5432/myhome
    username: myhome
    password: myhome
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true